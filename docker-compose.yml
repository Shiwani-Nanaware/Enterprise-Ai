version: "3.9"

# =============================================================================
# Enterprise AI Knowledge Assistant — Docker Compose
# MongoDB + ChromaDB edition
# =============================================================================

networks:
  enterprise_ai_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  document_storage:
    driver: local
  chroma_data:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # MongoDB — Primary Database (local for dev; use Atlas URI in production)
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: enterprise_ai_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${DATABASE_NAME:-finsolve_ai}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - enterprise_ai_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Redis — Cache and Session Store (optional)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: enterprise_ai_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - enterprise_ai_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend — FastAPI Application
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: enterprise_ai_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      DATABASE_NAME: ${DATABASE_NAME:-finsolve_ai}
      CHROMA_DB_PATH: /app/chroma_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - document_storage:/app/storage/documents
      - chroma_data:/app/chroma_db
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - enterprise_ai_network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite Application
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: enterprise_ai_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      VITE_APP_NAME: ${APP_NAME:-Enterprise AI Knowledge Assistant}
      VITE_APP_ENV: ${APP_ENV:-production}
    ports:
      - "5173:80"
    networks:
      - enterprise_ai_network
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy (production profile only)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: enterprise_ai_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - enterprise_ai_network
    depends_on:
      - frontend
      - backend
    profiles:
      - production
