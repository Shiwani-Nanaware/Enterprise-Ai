services:
  - type: web
    name: enterprise-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/v1/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_NAME
        value: finsolve_ai
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_BASE
        value: https://api.groq.com/openai/v1
      - key: OPENAI_CHAT_MODEL
        value: llama3-70b-8192
      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: CHROMA_DB_PATH
        value: /opt/render/project/src/chroma_db
      - key: CHROMA_COLLECTION_NAME
        value: enterprise_knowledge
      - key: DOCUMENT_STORAGE_PATH
        value: /opt/render/project/src/storage/documents
      - key: ALLOWED_ORIGINS
        value: '["https://enterprise-ai.vercel.app","http://localhost:5173"]'
      - key: APP_ENV
        value: production
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: INFO
